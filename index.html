<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YUNTING ZHU | Art & Tech & AI Adventure</title>
    
    <!-- 强制浏览器不缓存，每次都向服务器请求最新版本 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- 引入 Tailwind CSS (运行时编译) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel 用于在浏览器中实时编译 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#050505]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 内置 SVG 图标组件 (替代 lucide-react 以适应单文件运行) ---
        const icons = {
            ArrowRight: <g><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></g>,
            Terminal: <g><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></g>,
            User: <g><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></g>,
            Mail: <g><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></g>,
            Zap: <g><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></g>,
            Code: <g><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></g>,
            Play: <g><polygon points="5 3 19 12 5 21 5 3"></polygon></g>,
            ImageIcon: <g><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></g>,
            GraduationCap: <g><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c3 3 9 3 12 0v-5"></path></g>,
            MonitorPlay: <g><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line><polygon points="10 7 15 10 10 13 10 7"></polygon></g>,
            Layers: <g><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 12 12 17 22 12"></polyline><polyline points="2 17 12 22 22 17"></polyline></g>
        };

        const Icon = ({ name, size = 24, className = "" }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" 
                fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" 
                className={className}
            >
                {icons[name]}
            </svg>
        );

        // --- 主应用组件 ---
        const App = () => {
          const [currentPage, setCurrentPage] = useState('home');
          const [isTransitioning, setIsTransitioning] = useState(false);
          const [transitionStep, setTransitionStep] = useState(0); 
          
          const cursorRef = useRef(null);
          const cursorDotRef = useRef(null);

          // 自定义光标逻辑与双重防缓存注入
          useEffect(() => {
            const metaCache = document.createElement('meta');
            metaCache.httpEquiv = 'Cache-Control';
            metaCache.content = 'no-cache, no-store, must-revalidate';
            document.head.appendChild(metaCache);

            const metaPragma = document.createElement('meta');
            metaPragma.httpEquiv = 'Pragma';
            metaPragma.content = 'no-cache';
            document.head.appendChild(metaPragma);

            const metaExpires = document.createElement('meta');
            metaExpires.httpEquiv = 'Expires';
            metaExpires.content = '0';
            document.head.appendChild(metaExpires);

            const handleMouseMove = (e) => {
              if (cursorRef.current && cursorDotRef.current) {
                cursorRef.current.style.transform = `translate3d(${e.clientX - 20}px, ${e.clientY - 20}px, 0)`;
                cursorDotRef.current.style.transform = `translate3d(${e.clientX - 4}px, ${e.clientY - 4}px, 0)`;
              }
            };
            const handleMouseDown = () => { if (cursorRef.current) cursorRef.current.style.transform += ' scale(0.5)'; };
            const handleMouseUp = () => { if (cursorRef.current) cursorRef.current.style.transform = cursorRef.current.style.transform.replace(' scale(0.5)', ''); };

            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mousedown', handleMouseDown);
            window.addEventListener('mouseup', handleMouseUp);

            return () => {
              window.removeEventListener('mousemove', handleMouseMove);
              window.removeEventListener('mousedown', handleMouseDown);
              window.removeEventListener('mouseup', handleMouseUp);
            };
          }, []);

          const navigateTo = (page) => {
            if (page === currentPage || isTransitioning) return;
            setIsTransitioning(true);
            setTransitionStep(1); 
            setTimeout(() => {
              setCurrentPage(page); 
              setTransitionStep(2); 
              setTimeout(() => {
                setIsTransitioning(false);
                setTransitionStep(0); 
              }, 800);
            }, 800);
          };

          return (
            <div className="min-h-screen bg-[#050505] text-white font-sans overflow-x-hidden selection:bg-[#ff0055] selection:text-white flex flex-col">
              <style>{`
                @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&display=swap');
                body { font-family: 'Space Grotesk', system-ui, sans-serif; cursor: none; }
                
                /* 针对触屏设备隐藏自定义光标，恢复系统默认光标 */
                @media (hover: none) and (pointer: coarse) {
                  .custom-cursor { display: none !important; }
                  body { cursor: auto !important; }
                }

                .glitch-text { position: relative; display: inline-block; }
                .glitch-text::before, .glitch-text::after {
                  content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.8;
                }
                .glitch-text::before {
                  color: #00ff99; z-index: -1; transform: translate(-4px, 2px); animation: glitch-anim-1 2s infinite linear alternate-reverse;
                }
                .glitch-text::after {
                  color: #ff0055; z-index: -2; transform: translate(4px, -2px); animation: glitch-anim-2 3s infinite linear alternate-reverse;
                }
                @keyframes glitch-anim-1 {
                  0% { clip-path: inset(20% 0 80% 0); transform: translate(-4px, 2px); }
                  20% { clip-path: inset(60% 0 10% 0); transform: translate(4px, -2px); }
                  40% { clip-path: inset(40% 0 50% 0); transform: translate(-4px, 2px); }
                  60% { clip-path: inset(80% 0 5% 0); transform: translate(4px, -2px); }
                  80% { clip-path: inset(10% 0 70% 0); transform: translate(-4px, 2px); }
                  100% { clip-path: inset(30% 0 50% 0); transform: translate(4px, -2px); }
                }
                @keyframes glitch-anim-2 {
                  0% { clip-path: inset(10% 0 60% 0); transform: translate(4px, -2px); }
                  20% { clip-path: inset(30% 0 20% 0); transform: translate(-4px, 2px); }
                  40% { clip-path: inset(70% 0 10% 0); transform: translate(4px, -2px); }
                  60% { clip-path: inset(20% 0 50% 0); transform: translate(-4px, 2px); }
                  80% { clip-path: inset(50% 0 30% 0); transform: translate(4px, -2px); }
                  100% { clip-path: inset(5% 0 80% 0); transform: translate(-4px, 2px); }
                }
                .page-enter { animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(40px); }
                @keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }
                .hover-shake:hover { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
                @keyframes shake {
                  10%, 90% { transform: translate3d(-1px, 0, 0); }
                  20%, 80% { transform: translate3d(2px, 0, 0); }
                  30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
                  40%, 60% { transform: translate3d(4px, 0, 0); }
                }
                .hide-scrollbar::-webkit-scrollbar { display: none; }
              `}</style>

              <div ref={cursorRef} className="custom-cursor fixed top-0 left-0 w-10 h-10 border-2 border-[#00ff99] rounded-full pointer-events-none z-[100] transition-transform duration-100 ease-out mix-blend-difference" />
              <div ref={cursorDotRef} className="custom-cursor fixed top-0 left-0 w-2 h-2 bg-[#ff0055] rounded-full pointer-events-none z-[100]" />

              <div className="fixed inset-0 z-50 pointer-events-none flex" aria-hidden="true">
                {['#ff0055', '#00ff99', '#ffe600', '#00ccff'].map((color, index) => (
                  <div key={index} className="flex-1 h-full transition-transform duration-700 ease-[cubic-bezier(0.85,0,0.15,1)] origin-bottom"
                    style={{ backgroundColor: color, transform: transitionStep === 0 ? 'scaleY(0)' : transitionStep === 1 ? 'scaleY(1)' : 'scaleY(0)', transformOrigin: transitionStep === 1 ? 'bottom' : 'top', transitionDelay: `${index * 0.1}s` }} />
                ))}
              </div>

              {/* 响应式导航栏 */}
              <nav className="fixed w-full top-0 p-4 md:p-6 flex justify-between items-center z-40 mix-blend-difference">
                <div onClick={() => navigateTo('home')} className="text-xl md:text-2xl font-black cursor-pointer tracking-tighter hover:text-[#00ff99] transition-colors">
                  YUNTING.<span className="text-[#ff0055]">ZHU</span>
                </div>
                <div className="flex gap-4 sm:gap-6 md:gap-8 text-sm md:text-lg font-bold">
                  {['home', 'works', 'resume'].map((page) => (
                    <button key={page} onClick={() => navigateTo(page)} className={`uppercase tracking-widest relative group overflow-hidden ${currentPage === page ? 'text-[#ffe600]' : 'text-white'}`}>
                      <span className="relative z-10 group-hover:text-[#050505] transition-colors duration-300">{page}</span>
                      <div className="absolute inset-0 bg-[#00ff99] translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-in-out z-0" />
                    </button>
                  ))}
                </div>
              </nav>

              <main className="relative flex-1 pt-24 md:pt-32 pb-32 px-4 sm:px-6 md:px-20 z-10 w-full max-w-[100vw] overflow-x-hidden">
                {currentPage === 'home' && <HomeView navigateTo={navigateTo} />}
                {currentPage === 'works' && <WorksView />}
                {currentPage === 'resume' && <ResumeView />}
              </main>

              {/* 响应式底部栏 */}
              <div className="fixed bottom-0 w-full bg-[#050505] text-white py-3 md:py-4 px-4 sm:px-6 md:px-20 z-30 flex flex-col md:flex-row justify-between items-center border-t-2 border-[#1a1a1a] gap-2 md:gap-0">
                <div className="font-bold text-gray-600 text-[10px] sm:text-xs md:text-sm tracking-widest uppercase flex items-center gap-2">
                  <Icon name="Zap" size={14} className="text-[#ffe600] hidden sm:block"/> Signal_Link :: Connect
                </div>
                <div className="flex gap-4 sm:gap-8 items-center">
                  <a href="XXX" target="_blank" rel="noreferrer" className="flex items-center gap-1 sm:gap-2 hover:text-[#ff0055] font-black transition-colors uppercase tracking-widest text-xs sm:text-sm md:text-base group">
                    小红书 <span className="hidden sm:inline">(RED)</span> <Icon name="ArrowRight" size={14} className="group-hover:translate-x-1 transition-transform" />
                  </a>
                  <span className="text-gray-800">|</span>
                  <a href="XXX" target="_blank" rel="noreferrer" className="flex items-center gap-1 sm:gap-2 hover:text-[#00ccff] font-black transition-colors uppercase tracking-widest text-xs sm:text-sm md:text-base group">
                    B站 <span className="hidden sm:inline">(Bilibili)</span> <Icon name="ArrowRight" size={14} className="group-hover:translate-x-1 transition-transform" />
                  </a>
                </div>
              </div>
            </div>
          );
        };

        const HomeView = ({ navigateTo }) => (
          <div className="page-enter flex flex-col justify-center min-h-[70vh] w-full">
            <div className="inline-block mb-4 px-3 md:px-4 py-1 bg-[#00ccff] text-black font-bold uppercase tracking-widest text-xs md:text-sm w-max border-2 border-white transform -skew-x-12">
              Status: Ready for Intern / Co-op
            </div>
            
            {/* 核心改动：采用vw视口单位，防止小屏幕折行和溢出 */}
            <div className="w-full">
              <h1 className="text-[14vw] md:text-[6rem] lg:text-[7.5rem] font-black leading-none tracking-tighter uppercase glitch-text whitespace-nowrap" data-text="Art & Tech">
                Art & Tech
              </h1>
            </div>
            <div className="w-full mt-2">
              <h1 className="text-[10vw] md:text-[6rem] lg:text-[7.5rem] font-black leading-none tracking-tighter uppercase text-transparent whitespace-nowrap" style={{ WebkitTextStroke: '2px #00ff99' }}>
                & AI Adventure
              </h1>
            </div>

            <div className="mt-8 md:mt-12 max-w-2xl text-base sm:text-lg md:text-xl text-gray-300 font-bold border-l-4 border-[#ff0055] pl-4 md:pl-6 py-2 space-y-3">
              <p>你好，我是<span className="text-[#00ff99] mx-2 text-xl md:text-2xl">朱芸葶</span></p>
              <p className="text-[#ffe600]">南洋理工大学 (NTU) 游戏设计艺术与科技 (GDAT) 硕士</p>
              <p className="text-xs sm:text-sm text-gray-400 mt-2 font-normal leading-relaxed">
                数字媒体艺术家 / 技术美术 (TA)。精通 UE / Unity / Blender，并在 VR交互、投影装置与渲染管线优化上有丰富的实战经验。
                <br className="hidden sm:block"/><span className="text-[#00ccff] font-bold">手握 港科大、港城大、布里斯托、格拉斯哥艺术学院 等顶尖名校 Offer。</span>致力于探索艺术与前沿科技的边界。
              </p>
            </div>

            {/* 响应式按钮组：小屏幕垂直堆叠，大屏幕水平并列 */}
            <div className="mt-8 md:mt-12 flex flex-col sm:flex-row gap-4 sm:gap-6 w-full sm:w-auto">
              <button onClick={() => navigateTo('works')} className="hover-shake group relative px-6 md:px-8 py-4 bg-[#ff0055] text-white font-black text-sm sm:text-lg md:text-xl uppercase tracking-widest border-4 border-[#ff0055] overflow-hidden shadow-[6px_6px_0px_0px_rgba(0,255,153,1)] md:shadow-[8px_8px_0px_0px_rgba(0,255,153,1)] hover:shadow-none hover:translate-x-2 hover:translate-y-2 transition-all w-full sm:w-auto text-center justify-center flex">
                <span className="relative z-10 flex items-center gap-2">
                  View Portfolio <Icon name="MonitorPlay" className="group-hover:translate-x-2 transition-transform" />
                </span>
              </button>
              <button onClick={() => navigateTo('resume')} className="hover-shake px-6 md:px-8 py-4 bg-transparent text-white font-black text-sm sm:text-lg md:text-xl uppercase tracking-widest border-4 border-white shadow-[6px_6px_0px_0px_rgba(255,230,0,1)] md:shadow-[8px_8px_0px_0px_rgba(255,230,0,1)] hover:shadow-none hover:translate-x-2 hover:translate-y-2 transition-all hover:bg-white hover:text-black w-full sm:w-auto text-center">
                Interactive CV
              </button>
            </div>
          </div>
        );

        const WorksView = () => {
          const [filter, setFilter] = useState('All');

          const categories = [
            { id: 'All', label: '全部作品' },
            { id: 'Game Demo', label: '完整游戏 Demo' },
            { id: 'Digital Art', label: '个人数媒作品' },
            { id: 'Professional', label: '商业实习项目' },
            { id: 'Tech Art', label: '渲染与材质' }
          ];

          const projects = [
            { 
              title: "“城市游牧者”VR互动游戏", category: "Game Demo", type: "interactive", tag: "Unity / VR", role: "交互设计师", color: "#00ff99", shadow: "#ff0055",
              desc: "结合实体灯光装置与虚拟现实的互动游戏。荣获香港数字艺术设计大赛三等奖。"
            },
            { 
              title: "“幕启：后台行纪” 沉浸式叙事", category: "Game Demo", type: "video", tag: "Unity / VR", role: "核心开发(美术/程序)", color: "#ffe600", shadow: "#00ccff",
              desc: "以京剧《霸王别姬》为背景，主导开发了一款沉浸式 VR 数字叙事体验。获系内最高分。"
            },
            { 
              title: "光影互动装置《BoidsLight》", category: "Digital Art", type: "interactive", tag: "投影 / 装置", role: "新媒体艺术", color: "#ff0055", shadow: "#00ff99",
              desc: "入选 WePlay Expo 进行展出。结合硬件感应与视觉投影的生成式互动艺术装置。"
            },
            { 
              title: "“海马体”数字互动艺术展", category: "Digital Art", type: "interactive", tag: "Unity / AR / Shader", role: "AR 设计", color: "#ff0055", shadow: "#ffe600",
              desc: "采用 Unity Vuforia 设计增强现实功能，并开发着色器特效，提升展陈交互性。"
            },
            { 
              title: "杭州灵隐寺宣传视频", category: "Professional", type: "video", tag: "UE5 / Sequence", role: "技术美术", color: "#00ccff", shadow: "#ff0055",
              desc: "实习项目：运用虚幻引擎（Unreal Engine）制作杭州灵隐寺项目宣传视频。"
            },
            { 
              title: "数字孪生全息投影构建", category: "Professional", type: "interactive", tag: "UE / 数字孪生", role: "技术美术", color: "#00ccff", shadow: "#00ff99",
              desc: "宁夏数字孪生项目：负责基于虚幻引擎的数字展厅场景构建，对全息投影材质进行测试与调试。"
            },
            { 
              title: "复杂模型毛发材质渲染", category: "Tech Art", type: "image", tag: "Blender / 材质烘焙", role: "3D 美术", color: "#ffe600", shadow: "#ff0055",
              desc: "针对窗帘、地毯等复杂模型进行毛发材质测试与烘焙渲染，优化引擎端性能与表现。"
            },
            { 
              title: "网页端场景贴图烘焙", category: "Tech Art", type: "image", tag: "TA / 烘焙", role: "技术美术", color: "#ffe600", shadow: "#00ccff",
              desc: "上海亿方游网络实习项目：负责“城市漫游”网页端场景的贴图自动化烘焙工作。"
            }
          ];

          const filteredProjects = filter === 'All' ? projects : projects.filter(p => p.category === filter);

          return (
            <div className="page-enter">
              <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 md:mb-8 border-b-8 border-[#ffe600] pb-4 gap-4">
                <h2 className="text-4xl sm:text-5xl md:text-6xl font-black uppercase flex items-center gap-3 md:gap-4">
                  <Icon name="Layers" className="text-[#ff0055]" size={36}/> Works
                </h2>
                <a href="https://pan.baidu.com/s/1CR3jH2Mvdf_0m_5RXsX90w?pwd=8mp7" target="_blank" rel="noreferrer" className="flex items-center gap-1 sm:gap-2 hover:text-[#00ff99] transition-colors font-bold text-sm sm:text-base md:text-xl uppercase underline break-all">
                  网盘完整作品集 <Icon name="ArrowRight" size={16}/>
                </a>
              </div>

              {/* 分类过滤器适配 */}
              <div className="flex flex-wrap gap-2 md:gap-4 mb-8 md:mb-10">
                {categories.map(cat => (
                  <button 
                    key={cat.id}
                    onClick={() => setFilter(cat.id)}
                    className={`px-3 py-1.5 md:px-4 md:py-2 text-xs md:text-sm font-black uppercase tracking-widest border-2 transition-all ${
                      filter === cat.id 
                      ? 'bg-[#00ff99] text-black border-[#00ff99] shadow-[3px_3px_0px_#ff0055] translate-x-1 -translate-y-1' 
                      : 'bg-transparent text-gray-400 border-gray-600 hover:border-white hover:text-white'
                    }`}
                  >
                    {cat.label}
                  </button>
                ))}
              </div>
              
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-10 transition-all duration-500">
                {filteredProjects.map((project, i) => (
                  <article key={`${project.title}-${i}`} className="group cursor-pointer bg-[#111] border-4 border-white flex flex-col transition-all duration-300 hover:-translate-y-2 hover:translate-x-1 md:hover:-translate-y-4 md:hover:translate-x-2 animate-[slideUpFade_0.5s_ease-out]" style={{ boxShadow: `-6px 6px 0px 0px ${project.shadow}` }}>
                    
                    <div className="h-40 md:h-48 border-b-4 border-white relative overflow-hidden bg-[#222] flex items-center justify-center group-hover:bg-[#333] transition-colors">
                      <div className="absolute inset-0 opacity-20 bg-[linear-gradient(45deg,transparent_25%,rgba(255,255,255,0.2)_50%,transparent_75%,transparent_100%)] bg-[length:20px_20px] mix-blend-overlay" />
                      {project.type === 'video' && <Icon name="Play" size={48} className="text-white opacity-50 group-hover:scale-125 group-hover:text-[#00ff99] transition-all" />}
                      {project.type === 'image' && <Icon name="ImageIcon" size={48} className="text-white opacity-50 group-hover:scale-125 group-hover:text-[#ffe600] transition-all" />}
                      {project.type === 'interactive' && <Icon name="MonitorPlay" size={48} className="text-white opacity-50 group-hover:scale-125 group-hover:text-[#ff0055] transition-all" />}
                      <span className="absolute bottom-2 right-2 text-[10px] md:text-xs font-black px-2 py-1 bg-black text-white">{project.type.toUpperCase()}</span>
                    </div>

                    <div className="p-4 md:p-6 flex-1 flex flex-col">
                      <div className="flex flex-wrap gap-2 justify-between items-start mb-3 md:mb-4">
                        <span className="px-2 py-1 text-black font-black text-[10px] md:text-xs uppercase border-2 border-black whitespace-nowrap" style={{ backgroundColor: project.color }}>
                          {project.tag}
                        </span>
                        <span className="text-[10px] md:text-xs font-bold text-gray-500 uppercase whitespace-nowrap">{project.category}</span>
